<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hayati | Email Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Cairo:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-container": "#6063ee",
                      "surface-dim": "#d8dadc",
                      "on-tertiary-fixed": "#301400",
                      "tertiary-fixed": "#ffdcc5",
                      "on-primary-fixed-variant": "#2f2ebe",
                      "surface-container": "#eceef0",
                      "surface-container-highest": "#e0e3e5",
                      "on-error-container": "#93000a",
                      "secondary-container": "#dae2fd",
                      "surface-bright": "#f7f9fb",
                      "secondary-fixed-dim": "#bec6e0",
                      "primary-fixed-dim": "#c0c1ff",
                      "tertiary-fixed-dim": "#ffb783",
                      "on-surface-variant": "#464554",
                      "surface-container-low": "#f2f4f6",
                      "secondary-fixed": "#dae2fd",
                      "on-tertiary-container": "#fffbff",
                      "inverse-surface": "#2d3133",
                      "on-primary": "#ffffff",
                      "tertiary-container": "#b55d00",
                      "surface-container-high": "#e6e8ea",
                      "on-tertiary": "#ffffff",
                      "primary-fixed": "#e1e0ff",
                      "surface-variant": "#e0e3e5",
                      "background": "#f7f9fb",
                      "on-error": "#ffffff",
                      "on-primary-fixed": "#07006c",
                      "on-secondary": "#ffffff",
                      "on-tertiary-fixed-variant": "#703700",
                      "inverse-on-surface": "#eff1f3",
                      "surface": "#f7f9fb",
                      "on-surface": "#191c1e",
                      "error-container": "#ffdad6",
                      "on-secondary-fixed-variant": "#3f465c",
                      "error": "#ba1a1a",
                      "on-secondary-fixed": "#131b2e",
                      "outline-variant": "#c7c4d7",
                      "tertiary": "#904900",
                      "secondary": "#565e74",
                      "primary": "#4648d4",
                      "inverse-primary": "#c0c1ff",
                      "surface-tint": "#494bd6",
                      "surface-container-lowest": "#ffffff",
                      "on-background": "#191c1e",
                      "on-secondary-container": "#5c647a",
                      "outline": "#767586",
                      "on-primary-container": "#fffbff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xxl": "48px",
                      "base": "4px",
                      "xs": "4px",
                      "sidebar_width": "280px",
                      "xl": "32px",
                      "container_max": "1280px",
                      "md": "16px",
                      "lg": "24px",
                      "sm": "8px"
              },
              "fontFamily": {
                      "body-main": ["Inter"],
                      "h2": ["Inter"],
                      "body-sm": ["Inter"],
                      "label-caps": ["Inter"],
                      "rtl-h1": ["Cairo"],
                      "rtl-body": ["Cairo"],
                      "display-lg": ["Inter"],
                      "h1": ["Inter"]
              },
              "fontSize": {
                      "body-main": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                      "h2": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                      "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                      "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                      "rtl-h1": ["26px", { "lineHeight": "1.4", "fontWeight": "700" }],
                      "rtl-body": ["16px", { "lineHeight": "1.7", "fontWeight": "400" }],
                      "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                      "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Level 2 Ambient Shadow per design spec */
        .shadow-level-2 {
            box-shadow: 0 10px 15px rgba(15, 23, 42, 0.1);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md">
<!-- Main Verification Canvas (Transactional -> No Navigation Shell) -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl shadow-level-2 p-[32px] md:p-xxl flex flex-col items-center border border-surface-container-low">
<!-- Iconography Identity -->
<div class="w-[64px] h-[64px] bg-primary-container/10 rounded-full flex items-center justify-center mb-lg text-primary">
<span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">mark_email_read</span>
</div>
<!-- Typography: Bilingual Headers -->
<div class="text-center w-full mb-xl">
<h1 class="font-h1 text-h1 text-on-background mb-sm">Verify your email</h1>
<h1 class="font-rtl-h1 text-rtl-h1 text-on-background mb-md" dir="rtl">تأكيد البريد الإلكتروني</h1>
<p class="font-body-main text-body-main text-on-surface-variant">
                We've sent a 6-digit verification code to <span class="font-semibold text-on-background">user@example.com</span>.
            </p>
<p class="font-rtl-body text-rtl-body text-on-surface-variant mt-sm" dir="rtl">
                لقد أرسلنا رمز تحقق مكون من 6 أرقام إلى <span class="font-bold text-on-background" dir="ltr">user@example.com</span>.
            </p>
</div>
<!-- OTP Input Group -->
<div class="w-full mb-xl" dir="ltr">
<div class="flex justify-center gap-sm md:gap-md">
<!-- 6 Separate Input Boxes -->
<input aria-label="Digit 1" class="w-12 h-14 md:w-14 md:h-16 text-center font-h2 text-h2 text-on-background bg-surface border-2 border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input aria-label="Digit 2" class="w-12 h-14 md:w-14 md:h-16 text-center font-h2 text-h2 text-on-background bg-surface border-2 border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input aria-label="Digit 3" class="w-12 h-14 md:w-14 md:h-16 text-center font-h2 text-h2 text-on-background bg-surface border-2 border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input aria-label="Digit 4" class="w-12 h-14 md:w-14 md:h-16 text-center font-h2 text-h2 text-on-background bg-surface border-2 border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input aria-label="Digit 5" class="w-12 h-14 md:w-14 md:h-16 text-center font-h2 text-h2 text-on-background bg-surface border-2 border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" maxlength="1" placeholder="-" type="text"/>
<input aria-label="Digit 6" class="w-12 h-14 md:w-14 md:h-16 text-center font-h2 text-h2 text-on-background bg-surface border-2 border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" maxlength="1" placeholder="-" type="text"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-[14px] rounded-xl font-body-main text-body-main font-semibold hover:bg-surface-tint active:scale-[0.98] transition-all duration-200 flex justify-center items-center gap-md shadow-sm mb-lg" type="button">
<span>Verify Code</span>
<span class="w-[1px] h-[16px] bg-white/30"></span>
<span class="font-rtl-body font-bold" dir="rtl">تأكيد الرمز</span>
</button>
<!-- Secondary Action / Timer -->
<div class="text-center w-full bg-surface py-md px-lg rounded-lg border border-surface-container-high">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-xs">
                Didn't receive the code? 
                <button class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-xs transition-all" type="button">Resend in 00:59</button>
</p>
<p class="font-rtl-body text-[14px] text-on-surface-variant" dir="rtl">
                لم تستلم الرمز؟ 
                <button class="text-primary font-bold hover:underline decoration-2 underline-offset-4 mr-xs transition-all" type="button">إعادة إرسال خلال 00:59</button>
</p>
</div>
</main>
</body></html>
