<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hayati | Daily Mood Log</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Cairo:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#6063ee",
                        "surface-dim": "#d8dadc",
                        "on-tertiary-fixed": "#301400",
                        "tertiary-fixed": "#ffdcc5",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-container": "#eceef0",
                        "surface-container-highest": "#e0e3e5",
                        "on-error-container": "#93000a",
                        "secondary-container": "#dae2fd",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed-dim": "#bec6e0",
                        "primary-fixed-dim": "#c0c1ff",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-surface-variant": "#464554",
                        "surface-container-low": "#f2f4f6",
                        "secondary-fixed": "#dae2fd",
                        "on-tertiary-container": "#fffbff",
                        "inverse-surface": "#2d3133",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#b55d00",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#e1e0ff",
                        "surface-variant": "#e0e3e5",
                        "background": "#f7f9fb",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#07006c",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#703700",
                        "inverse-on-surface": "#eff1f3",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#3f465c",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#131b2e",
                        "outline-variant": "#c7c4d7",
                        "tertiary": "#904900",
                        "secondary": "#565e74",
                        "primary": "#4648d4",
                        "inverse-primary": "#c0c1ff",
                        "surface-tint": "#494bd6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#191c1e",
                        "on-secondary-container": "#5c647a",
                        "outline": "#767586",
                        "on-primary-container": "#fffbff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xxl": "48px",
                        "base": "4px",
                        "xs": "4px",
                        "sidebar_width": "280px",
                        "xl": "32px",
                        "container_max": "1280px",
                        "md": "16px",
                        "lg": "24px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "body-main": ["Inter"],
                        "h2": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "rtl-h1": ["Cairo"],
                        "rtl-body": ["Cairo"],
                        "display-lg": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "body-main": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "rtl-h1": ["26px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "rtl-body": ["16px", { "lineHeight": "1.7", "fontWeight": "400" }],
                        "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-main text-body-main antialiased selection:bg-primary selection:text-on-primary">
<!-- Modal Backdrop / Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-[#0F172A]/40 backdrop-blur-sm p-4">
<!-- Modal Card -->
<div aria-labelledby="modal-title" aria-modal="true" class="bg-surface-container-lowest rounded-xl shadow-[0_10px_15px_-3px_rgba(15,23,42,0.1)] w-full max-w-[600px] overflow-hidden flex flex-col relative" role="dialog">
<!-- Close Button (Top Right) -->
<button aria-label="Close modal" class="absolute top-4 right-4 p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<!-- Modal Header -->
<div class="pt-8 px-8 pb-4 text-center">
<h2 class="font-h1 text-h1 text-on-surface mb-2" id="modal-title">How are you feeling today?</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Log your daily mood to help track your patterns.</p>
</div>
<!-- Modal Body -->
<div class="p-8 flex-1 overflow-y-auto">
<!-- Mood Options Grid -->
<div class="grid grid-cols-5 gap-sm mb-8">
<!-- Option: Great -->
<label class="cursor-pointer group flex flex-col items-center gap-2">
<input class="sr-only peer" name="mood" type="radio" value="great"/>
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-2xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-secondary-container transition-all group-hover:scale-105 peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-2">
                            😄
                        </div>
<span class="font-label-caps text-label-caps text-on-surface-variant peer-checked:text-primary transition-colors">Great</span>
</label>
<!-- Option: Good -->
<label class="cursor-pointer group flex flex-col items-center gap-2">
<input class="sr-only peer" name="mood" type="radio" value="good"/>
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-2xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-secondary-container transition-all group-hover:scale-105 peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-2">
                            🙂
                        </div>
<span class="font-label-caps text-label-caps text-on-surface-variant peer-checked:text-primary transition-colors">Good</span>
</label>
<!-- Option: Okay -->
<label class="cursor-pointer group flex flex-col items-center gap-2">
<input checked="" class="sr-only peer" name="mood" type="radio" value="okay"/>
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-2xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-secondary-container transition-all group-hover:scale-105 peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-2">
                            😐
                        </div>
<span class="font-label-caps text-label-caps text-on-surface-variant peer-checked:text-primary transition-colors">Okay</span>
</label>
<!-- Option: Low -->
<label class="cursor-pointer group flex flex-col items-center gap-2">
<input class="sr-only peer" name="mood" type="radio" value="low"/>
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-2xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-secondary-container transition-all group-hover:scale-105 peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-2">
                            😔
                        </div>
<span class="font-label-caps text-label-caps text-on-surface-variant peer-checked:text-primary transition-colors">Low</span>
</label>
<!-- Option: Hard -->
<label class="cursor-pointer group flex flex-col items-center gap-2">
<input class="sr-only peer" name="mood" type="radio" value="hard"/>
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-2xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-secondary-container transition-all group-hover:scale-105 peer-focus-visible:ring-2 peer-focus-visible:ring-primary peer-focus-visible:ring-offset-2">
                            😫
                        </div>
<span class="font-label-caps text-label-caps text-on-surface-variant peer-checked:text-primary transition-colors">Hard</span>
</label>
</div>
<!-- Text Area -->
<div class="flex flex-col gap-2">
<label class="font-h2 text-h2 text-on-surface" for="mood-notes">What's on your mind?</label>
<textarea class="w-full bg-surface rounded-lg border border-outline-variant p-4 text-body-main font-body-main text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-shadow resize-none" id="mood-notes" name="mood-notes" placeholder="Add some notes about your day..." rows="4"></textarea>
</div>
</div>
<!-- Modal Footer (Actions) -->
<div class="p-6 bg-surface-bright border-t border-surface-container flex items-center justify-between rtl:flex-row-reverse">
<button class="px-6 py-2 rounded-lg font-h2 text-body-sm text-primary border border-transparent hover:bg-primary/5 transition-colors focus:ring-2 focus:ring-primary focus:outline-none" type="button">
                    Skip for now
                </button>
<button class="px-6 py-2 rounded-lg font-h2 text-body-sm bg-primary text-on-primary hover:bg-primary/90 active:scale-95 transition-all focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:outline-none shadow-sm" type="button">
                    Save Log
                </button>
</div>
</div>
</div>
</body></html>
