<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hayati | حياتي - Habit Tracker & Journal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "secondary-fixed-dim": "#bec6e0", "error": "#ba1a1a", "surface-container-highest": "#e0e3e5", "on-tertiary": "#ffffff", "surface-container-high": "#e6e8ea", "on-secondary-container": "#5c647a", "error-container": "#ffdad6", "surface-container-low": "#f2f4f6", "surface-container-lowest": "#ffffff", "on-primary-fixed-variant": "#2f2ebe", "primary": "#4648d4", "on-secondary": "#ffffff", "tertiary-fixed": "#ffdcc5", "primary-fixed": "#e1e0ff", "on-primary": "#ffffff", "inverse-primary": "#c0c1ff", "secondary-container": "#dae2fd", "secondary": "#565e74", "on-primary-fixed": "#07006c", "secondary-fixed": "#dae2fd", "on-tertiary-fixed": "#301400", "tertiary": "#904900", "background": "#f7f9fb", "tertiary-fixed-dim": "#ffb783", "primary-fixed-dim": "#c0c1ff", "primary-container": "#6063ee", "on-tertiary-container": "#fffbff", "surface-tint": "#494bd6", "on-error": "#ffffff", "surface-bright": "#f7f9fb", "inverse-on-surface": "#eff1f3", "on-primary-container": "#fffbff", "tertiary-container": "#b55d00", "outline": "#767586", "surface-container": "#eceef0", "on-secondary-fixed-variant": "#3f465c", "outline-variant": "#c7c4d7", "surface": "#f7f9fb", "on-background": "#191c1e", "on-surface": "#191c1e", "surface-dim": "#d8dadc", "on-tertiary-fixed-variant": "#703700", "on-error-container": "#93000a", "surface-variant": "#e0e3e5", "on-surface-variant": "#464554", "on-secondary-fixed": "#131b2e", "inverse-surface": "#2d3133" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { container_max: "1280px", base: "4px", xxl: "48px", xs: "4px", sm: "8px", sidebar_width: "280px", lg: "24px", xl: "32px", md: "16px" },
    fontFamily: { "rtl-body": ["Cairo"], "display-lg": ["Inter"], "body-main": ["Inter"], h1: ["Inter"], "rtl-h1": ["Cairo"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"] },
    fontSize: { "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body></body>
<script>
async function init() {
  initAppShell('habits', 'Habit Tracker & Journal', ' Build better routines, reflect daily');
  const main = document.getElementById('app-main');

  async function load() {
    try {
      const [habitsData, journalData] = await Promise.all([
        API.get('/habits'),
        API.get('/journal')
      ]);
      const habits = habitsData.habits || [];
      const entries = journalData.entries || [];

      const today = new Date().toISOString().split('T')[0];
      const todayEntries = entries.filter(e => e.created_at && e.created_at.startsWith(today));

      const habitCards = habits.map(h => {
        const sevenDays = Array.from({length: 7}, (_, i) => {
          const d = new Date();
          d.setDate(d.getDate() - (6 - i));
          const dateStr = d.toISOString().split('T')[0];
          const log = h.logs.find(l => l.date === dateStr);
          return `<div class="w-6 h-6 rounded-full ${log ? 'bg-primary flex items-center justify-center' : 'bg-surface-container-highest border border-outline-variant'}">${log ? '<span class="material-symbols-outlined text-[14px] text-white">check</span>' : ''}</div>`;
        }).join('');

        const iconMap = { self_improvement: 'self_improvement', water_drop: 'water_drop', exercise: 'exercise', menu_book: 'menu_book', brightness_5: 'brightness_5' };
        return `
          <div class="bg-surface-container-lowest rounded-xl p-md shadow-level-1 border border-surface-container-low">
            <div class="flex justify-between items-start">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-primary-fixed flex items-center justify-center text-primary">
                  <span class="material-symbols-outlined">${iconMap[h.icon] || 'self_improvement'}</span>
                </div>
                <div>
                  <h3 class="font-body-main text-body-main font-semibold">${h.name}</h3>
                  <div class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-1 mt-1">🔥 ${h.streak || 0} days</div>
                </div>
              </div>
              <button class="habit-delete text-outline-variant hover:text-error" data-id="${h.id}"><span class="material-symbols-outlined">delete</span></button>
            </div>
            <div class="flex gap-1 mt-3">${sevenDays}</div>
            <button class="habit-check-btn mt-3 w-full bg-surface-container text-body-sm py-sm rounded-lg hover:bg-surface-container-high transition-colors" data-id="${h.id}">Log Today</button>
          </div>
        `;
      }).join('') || '<p class="text-body-sm text-on-surface-variant">No habits yet. Add one below!</p>';

      const timelineItems = entries.slice(0, 10).map(e => `
        <div class="relative">
          <div class="absolute -left-[31px] top-1 w-4 h-4 rounded-full bg-surface-container-highest border-2 border-background"></div>
          <div class="bg-surface-container-lowest p-4 rounded-xl border border-surface-container-low shadow-level-1 hover:shadow-md transition-shadow">
            <div class="flex justify-between items-start mb-2">
              <h4 class="font-body-main text-body-main font-semibold text-on-background">${e.title || 'Untitled'}</h4>
              <span class="font-body-sm text-body-sm text-on-surface-variant">${e.created_at ? new Date(e.created_at).toLocaleDateString() : ''}</span>
            </div>
            <p class="font-body-sm text-body-sm text-on-surface truncate">${e.content || ''}</p>
            ${e.mood_tag ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[10px] uppercase font-bold bg-secondary-container text-on-secondary-container mt-2">${e.mood_tag}</span>` : ''}
          </div>
        </div>
      `).join('') || '<p class="text-body-sm text-on-surface-variant">No journal entries yet.</p>';

      const todayChecklist = habits.filter(h => {
        const todayLog = h.logs && h.logs[0] && h.logs[0].date === today;
        return !todayLog;
      });

      main.innerHTML = `
        <div class="max-w-container_max mx-auto">
          <div class="flex justify-between items-center mb-lg">
            <div>
              <h1 class="font-display-lg text-display-lg text-on-background">Habits & Journal</h1>
              <p class="text-on-surface-variant font-body-sm text-body-sm">${today}</p>
            </div>
          </div>
          <div class="grid grid-cols-1 xl:grid-cols-3 gap-lg">
            <div class="xl:col-span-2 flex flex-col gap-lg">
              <div class="bg-surface-container-lowest rounded-xl p-lg shadow-level-1 border border-surface-container-low">
                <div class="flex justify-between items-center mb-md">
                  <h2 class="font-h2 text-h2 text-on-background">Today's Focus</h2>
                  <span class="font-label-caps text-label-caps text-primary bg-primary-fixed px-3 py-1 rounded-full">${habits.filter(h => h.logs && h.logs[0] && h.logs[0].completed).length}/${habits.length} COMPLETED</span>
                </div>
              </div>
              <div>
                <div class="flex justify-between items-center mb-md">
                  <h2 class="font-h2 text-h2 text-on-background">Habit Streaks</h2>
                  <button id="add-habit-btn" class="flex items-center gap-2 text-primary font-body-sm text-body-sm hover:underline">
                    <span class="material-symbols-outlined" style="font-size: 18px;">add</span> Add Habit
                  </button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-md">${habitCards}</div>
              </div>
            </div>
            <div class="flex flex-col gap-lg">
              <div class="bg-surface-container-lowest rounded-xl shadow-level-1 border border-surface-container-low flex flex-col overflow-hidden">
                <div class="p-4 border-b border-surface-container-low">
                  <input id="journal-title" class="w-full bg-transparent border-none focus:ring-0 font-h2 text-h2 text-on-background placeholder:text-on-surface-variant" placeholder="Journal Title..." type="text"/>
                </div>
                <div class="p-4 flex-1 flex flex-col gap-4">
                  <textarea id="journal-content" class="w-full flex-1 resize-none bg-transparent border-none focus:ring-0 font-body-main text-body-main text-on-surface placeholder:text-outline" placeholder="How was your day?" rows="4"></textarea>
                </div>
                <div class="p-4 border-t border-surface-container-low bg-surface-bright flex justify-between items-center">
                  <button id="journal-save-btn" class="bg-primary text-on-primary px-6 py-2 rounded-lg font-body-main font-semibold hover:bg-surface-tint active:scale-95 transition-all">Save Entry</button>
                </div>
              </div>
              <div class="mt-lg">
                <h2 class="font-h2 text-h2 text-on-background mb-md">Past Entries</h2>
                <div class="space-y-4 border-s-2 border-surface-container-high ml-4 pl-6 relative">
                  ${timelineItems}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('add-habit-btn').addEventListener('click', async () => {
        const name = prompt('Habit name:');
        if (!name) return;
        await API.post('/habits', { name });
        load();
      });

      document.querySelectorAll('.habit-check-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
          try {
            await API.put(`/habits/${this.dataset.id}/check`);
            load();
          } catch {}
        });
      });

      document.querySelectorAll('.habit-delete').forEach(btn => {
        btn.addEventListener('click', async function() {
          if (confirm('Delete this habit?')) {
            await API.del(`/habits/${this.dataset.id}`);
            load();
          }
        });
      });

      document.getElementById('journal-save-btn').addEventListener('click', async () => {
        const title = document.getElementById('journal-title').value;
        const content = document.getElementById('journal-content').value;
        if (!content) return alert('Please write something first');
        await API.post('/journal', { title, content });
        document.getElementById('journal-title').value = '';
        document.getElementById('journal-content').value = '';
        load();
      });
    } catch (err) {
      main.innerHTML = `<p class="text-error">Error: ${err.message}</p>`;
    }
  }
  load();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</html>
