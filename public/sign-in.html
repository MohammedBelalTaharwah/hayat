<!DOCTYPE html>
<html class="light" dir="ltr" lang="en">
<head>
<meta charset="utf-8"/>

<body class="bg-surface font-body-main text-on-surface flex items-center justify-center min-h-screen p-md">
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl p-xl shadow-sm border border-surface-variant flex flex-col gap-lg relative">
<header class="flex flex-col items-center gap-sm text-center">
<div class="h-12 w-12 bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center mb-xs shadow-sm">
<span class="material-symbols-outlined text-[24px]">lock_person</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface">Hayati | حياتي</h1>
<p class="font-body-main text-body-main text-on-surface-variant">Welcome back. Please enter your details.</p>
</header>
<div id="error-msg" class="bg-error-container text-on-error-container p-sm rounded-lg text-body-sm hidden"></div>
<form id="login-form" class="flex flex-col gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="email">Email</label>
<input class="w-full px-md py-[10px] rounded-lg border border-outline-variant bg-surface-container-lowest text-body-main text-on-surface focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-all placeholder:text-outline-variant" id="email" placeholder="Enter your email" type="email" required/>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-surface-tint hover:underline transition-colors" href="/forgot-password.html">Forgot Password?</a>
</div>
<input class="w-full px-md py-[10px] rounded-lg border border-outline-variant bg-surface-container-lowest text-body-main text-on-surface focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-all placeholder:text-outline-variant" id="password" placeholder="********" type="password" required/>
</div>
<button class="w-full mt-sm py-[10px] px-md rounded-lg bg-primary text-on-primary font-body-main font-semibold hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center shadow-sm" type="submit">Sign In</button>
</form>
<div class="relative flex items-center py-xs">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 px-md font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest">Or continue with</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<button class="w-full py-[10px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-main font-medium hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
</svg>
Sign in with Google
</button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-sm">
Don't have an account? <a class="text-primary font-medium hover:text-surface-tint hover:underline transition-colors" href="/create-account.html">Sign up</a>
</p>
</main>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  try {
    await API.login(email, password);
    window.location.href = '/dashboard.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
});
</script>
</body>
</html>
