<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account - Hayati | حياتي</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary-container": "#6063ee", "surface-dim": "#d8dadc", "on-tertiary-fixed": "#301400", "tertiary-fixed": "#ffdcc5", "on-primary-fixed-variant": "#2f2ebe", "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5", "on-error-container": "#93000a", "secondary-container": "#dae2fd", "surface-bright": "#f7f9fb", "secondary-fixed-dim": "#bec6e0", "primary-fixed-dim": "#c0c1ff", "tertiary-fixed-dim": "#ffb783", "on-surface-variant": "#464554", "surface-container-low": "#f2f4f6", "secondary-fixed": "#dae2fd", "on-tertiary-container": "#fffbff", "inverse-surface": "#2d3133", "on-primary": "#ffffff", "tertiary-container": "#b55d00", "surface-container-high": "#e6e8ea", "on-tertiary": "#ffffff", "primary-fixed": "#e1e0ff", "surface-variant": "#e0e3e5", "background": "#f7f9fb", "on-error": "#ffffff", "on-primary-fixed": "#07006c", "on-secondary": "#ffffff", "on-tertiary-fixed-variant": "#703700", "inverse-on-surface": "#eff1f3", "surface": "#f7f9fb", "on-surface": "#191c1e", "error-container": "#ffdad6", "on-secondary-fixed-variant": "#3f465c", "error": "#ba1a1a", "on-secondary-fixed": "#131b2e", "outline-variant": "#c7c4d7", "tertiary": "#904900", "secondary": "#565e74", "primary": "#4648d4", "inverse-primary": "#c0c1ff", "surface-tint": "#494bd6", "surface-container-lowest": "#ffffff", "on-background": "#191c1e", "on-secondary-container": "#5c647a", "outline": "#767586", "on-primary-container": "#fffbff" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { xxl: "48px", base: "4px", xs: "4px", sidebar_width: "280px", xl: "32px", container_max: "1280px", md: "16px", lg: "24px", sm: "8px" },
    fontFamily: { "body-main": ["Inter"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"], "rtl-h1": ["Cairo"], "rtl-body": ["Cairo"], "display-lg": ["Inter"], h1: ["Inter"] },
    fontSize: { "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-sm p-lg lg:p-xl flex flex-col gap-lg border border-surface-container-high">
<div class="flex flex-col items-center text-center gap-sm">
<h1 class="font-display-lg text-display-lg text-primary mb-sm">Hayati | حياتي</h1>
<h2 class="font-h1 text-h1 text-on-surface">Create your account</h2>
<p class="font-body-main text-body-main text-on-surface-variant">Start organizing your life today.</p>
</div>
<div id="error-msg" class="bg-error-container text-on-error-container p-sm rounded-lg text-body-sm hidden"></div>
<form id="signup-form" class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="name">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">person</span>
<input class="w-full pl-xl pr-md py-sm bg-surface rounded-lg border border-surface-variant focus:border-primary focus:ring-2 focus:ring-primary-container/20 font-body-main text-body-main text-on-surface placeholder-on-surface-variant transition-colors" id="name" placeholder="John Doe" type="text" required/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">mail</span>
<input class="w-full pl-xl pr-md py-sm bg-surface rounded-lg border border-surface-variant focus:border-primary focus:ring-2 focus:ring-primary-container/20 font-body-main text-body-main text-on-surface placeholder-on-surface-variant transition-colors" id="email" placeholder="john@example.com" type="email" required/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">lock</span>
<input class="w-full pl-xl pr-md py-sm bg-surface rounded-lg border border-surface-variant focus:border-primary focus:ring-2 focus:ring-primary-container/20 font-body-main text-body-main text-on-surface placeholder-on-surface-variant transition-colors" id="password" placeholder="********" type="password" required/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="confirm_password">Confirm Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">lock_reset</span>
<input class="w-full pl-xl pr-md py-sm bg-surface rounded-lg border border-surface-variant focus:border-primary focus:ring-2 focus:ring-primary-container/20 font-body-main text-body-main text-on-surface placeholder-on-surface-variant transition-colors" id="confirm_password" placeholder="********" type="password" required/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-h2 text-h2 py-sm rounded-lg mt-md transition-colors active:scale-95 flex items-center justify-center gap-sm" type="submit">
Create Account <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-sm">An OTP will be sent to your email to verify your account.</p>
</form>
<div class="text-center pt-md border-t border-surface-container-high">
<p class="font-body-main text-body-main text-on-surface-variant">
Already have an account? <a class="text-primary hover:text-primary-container font-h2 text-body-main transition-colors" href="/sign-in.html">Sign in</a>
</p>
</div>
</div>
<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm_password').value;
  const errEl = document.getElementById('error-msg');
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match';
    errEl.classList.remove('hidden');
    return;
  }
  try {
    await API.signup(name, email, password);
    window.location.href = '/email-verification.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
});
</script>
</body>
</html>
