<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - Hayati | حياتي</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary-container": "#6063ee", "surface-dim": "#d8dadc", "on-tertiary-fixed": "#301400", "tertiary-fixed": "#ffdcc5", "on-primary-fixed-variant": "#2f2ebe", "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5", "on-error-container": "#93000a", "secondary-container": "#dae2fd", "surface-bright": "#f7f9fb", "secondary-fixed-dim": "#bec6e0", "primary-fixed-dim": "#c0c1ff", "tertiary-fixed-dim": "#ffb783", "on-surface-variant": "#464554", "surface-container-low": "#f2f4f6", "secondary-fixed": "#dae2fd", "on-tertiary-container": "#fffbff", "inverse-surface": "#2d3133", "on-primary": "#ffffff", "tertiary-container": "#b55d00", "surface-container-high": "#e6e8ea", "on-tertiary": "#ffffff", "primary-fixed": "#e1e0ff", "surface-variant": "#e0e3e5", "background": "#f7f9fb", "on-error": "#ffffff", "on-primary-fixed": "#07006c", "on-secondary": "#ffffff", "on-tertiary-fixed-variant": "#703700", "inverse-on-surface": "#eff1f3", "surface": "#f7f9fb", "on-surface": "#191c1e", "error-container": "#ffdad6", "on-secondary-fixed-variant": "#3f465c", "error": "#ba1a1a", "on-secondary-fixed": "#131b2e", "outline-variant": "#c7c4d7", "tertiary": "#904900", "secondary": "#565e74", "primary": "#4648d4", "inverse-primary": "#c0c1ff", "surface-tint": "#494bd6", "surface-container-lowest": "#ffffff", "on-background": "#191c1e", "on-secondary-container": "#5c647a", "outline": "#767586", "on-primary-container": "#fffbff" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { xxl: "48px", base: "4px", xs: "4px", sidebar_width: "280px", xl: "32px", container_max: "1280px", md: "16px", lg: "24px", sm: "8px" },
    fontFamily: { "body-main": ["Inter"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"], "rtl-h1": ["Cairo"], "rtl-body": ["Cairo"], "display-lg": ["Inter"], h1: ["Inter"] },
    fontSize: { "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body></body>
<script>
async function init() {
  initAppShell('dashboard', 'Dashboard', 'Overview');
  const main = document.getElementById('app-main');

  let data;
  try {
    data = await API.get('/dashboard/stats');
  } catch {
    main.innerHTML = '<p class="text-error">Failed to load dashboard. Try refreshing.</p>';
    return;
  }

  const user = API.getUser();
  const name = user ? user.name.split(' ')[0] : 'User';

  const moods = data.recentMoods || [];
  const moodEmojis = { great: '😄', good: '🙂', okay: '😐', low: '😔', hard: '😫' };
  const moodDots = moods.slice(0, 7).map(m =>
    `<div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-sm" title="${m.mood}">${moodEmojis[m.mood] || '😐'}</div>`
  ).join('') || '<div class="text-body-sm text-on-surface-variant">No mood data yet</div>';

  const habitItems = (data.habits || []).map(h => {
    const checked = h.logs && h.logs[0] && h.logs[0].completed ? 'checked' : '';
    const iconMap = { self_improvement: 'self_improvement', water_drop: 'water_drop', exercise: 'exercise', menu_book: 'menu_book', brightness_5: 'brightness_5' };
    const icon = iconMap[h.icon] || 'self_improvement';
    return `
      <div class="flex items-center justify-between p-sm hover:bg-surface-container-low rounded-lg transition-colors">
        <div class="flex items-center gap-md">
          <div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
            <span class="material-symbols-outlined">${icon}</span>
          </div>
          <div>
            <p class="font-body-main font-bold">${h.name}</p>
            <p class="text-body-sm text-on-surface-variant">Streak: ${h.streak || 0} days</p>
          </div>
        </div>
        <input type="checkbox" ${checked} class="w-6 h-6 rounded border-outline text-primary focus:ring-primary habit-check" data-id="${h.id}" />
      </div>
    `;
  }).join('') || '<p class="text-body-sm text-on-surface-variant">No habits yet. <a href="/habits-journal.html" class="text-primary">Add one!</a></p>';

  main.innerHTML = `
    <div class="max-w-container_max mx-auto space-y-lg">
      <div class="flex justify-between items-center mb-md">
        <div>
          <h2 class="font-h1 text-h1 text-on-surface">Welcome Back, ${name}</h2>
          <p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Here is your life at a glance.</p>
        </div>
        <button onclick="window.location.href='/todo.html'" class="flex items-center gap-sm px-md py-sm border border-primary text-primary rounded-lg font-h2 text-h2 hover:bg-primary hover:text-white transition-colors duration-200 bg-transparent">
          <span class="material-symbols-outlined text-[20px]">calendar_month</span> Weekly View
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-md">
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low flex flex-col">
          <div class="flex justify-between items-start mb-sm">
            <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Tasks Completed</span>
            <span class="material-symbols-outlined text-primary text-[20px]">task_alt</span>
          </div>
          <div class="font-display-lg text-display-lg text-on-surface mt-sm">${data.tasksCompleted || 0}</div>
          ${data.totalTasks > 0 ? `<div class="flex items-center gap-xs mt-xs text-secondary font-body-sm text-body-sm"><span class="text-[#059669] flex items-center">${Math.round((data.tasksCompleted / data.totalTasks) * 100)}%</span> completion rate</div>` : '<div class="flex items-center gap-xs mt-xs text-secondary font-body-sm text-body-sm">No tasks yet</div>'}
        </div>
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low flex flex-col">
          <div class="flex justify-between items-start mb-sm">
            <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Goals Progress</span>
            <span class="material-symbols-outlined text-tertiary-container text-[20px]">trending_up</span>
          </div>
          <div class="font-display-lg text-display-lg text-on-surface mt-sm">${data.goalsProgress || 0}%</div>
          <div class="w-full bg-surface-container h-2 rounded-full mt-sm overflow-hidden">
            <div class="bg-tertiary-container h-full rounded-full" style="width: ${data.goalsProgress || 0}%"></div>
          </div>
        </div>
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low flex flex-col">
          <div class="flex justify-between items-start mb-sm">
            <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Study Hours</span>
            <span class="material-symbols-outlined text-[#0284c7] text-[20px]">menu_book</span>
          </div>
          <div class="font-display-lg text-display-lg text-on-surface mt-sm">${data.studyHours || 0}</div>
          <div class="flex items-center gap-xs mt-xs text-secondary font-body-sm text-body-sm">Total hours learned</div>
        </div>
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low flex flex-col">
          <div class="flex justify-between items-start mb-sm">
            <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Streak Days</span>
            <span class="material-symbols-outlined text-[#ea580c] text-[20px]">local_fire_department</span>
          </div>
          <div class="font-display-lg text-display-lg text-on-surface mt-sm">${data.streakDays || 0}</div>
          <div class="flex items-center gap-xs mt-auto pt-sm text-secondary font-body-sm text-body-sm">${data.streakDays > 0 ? 'Keep it up!' : 'Start a habit streak!'}</div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-lg">
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
          <h3 class="font-h2 text-h2 text-on-surface mb-md">Mood This Week</h3>
          <div class="flex gap-sm">${moodDots}</div>
          ${data.todayMood ? `<p class="mt-sm text-body-sm text-on-surface-variant">Today: ${moodEmojis[data.todayMood.mood] || '😐'} ${data.todayMood.mood}</p>` : ''}
        </div>
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
          <div class="flex justify-between items-center mb-md">
            <h3 class="font-h2 text-h2 text-on-surface">Habit Streak Summary</h3>
            <a href="/habits-journal.html" class="text-primary text-body-sm hover:underline">View All</a>
          </div>
          <div class="space-y-md">${habitItems}</div>
        </div>
      </div>
    </div>
  `;

  document.querySelectorAll('.habit-check').forEach(cb => {
    cb.addEventListener('change', async function() {
      try {
        await API.put(`/habits/${this.dataset.id}/check`);
      } catch {}
    });
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>
</html>
