<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings - Admin - Hayati</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script src="admin.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary-container": "#6063ee", "surface-dim": "#d8dadc", "on-tertiary-fixed": "#301400", "tertiary-fixed": "#ffdcc5", "on-primary-fixed-variant": "#2f2ebe", "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5", "on-error-container": "#93000a", "secondary-container": "#dae2fd", "surface-bright": "#f7f9fb", "secondary-fixed-dim": "#bec6e0", "primary-fixed-dim": "#c0c1ff", "tertiary-fixed-dim": "#ffb783", "on-surface-variant": "#464554", "surface-container-low": "#f2f4f6", "secondary-fixed": "#dae2fd", "on-tertiary-container": "#fffbff", "inverse-surface": "#2d3133", "on-primary": "#ffffff", "tertiary-container": "#b55d00", "surface-container-high": "#e6e8ea", "on-tertiary": "#ffffff", "primary-fixed": "#e1e0ff", "surface-variant": "#e0e3e5", "background": "#f7f9fb", "on-error": "#ffffff", "on-primary-fixed": "#07006c", "on-secondary": "#ffffff", "on-tertiary-fixed-variant": "#703700", "inverse-on-surface": "#eff1f3", "surface": "#f7f9fb", "on-surface": "#191c1e", "error-container": "#ffdad6", "on-secondary-fixed-variant": "#3f465c", "error": "#ba1a1a", "on-secondary-fixed": "#131b2e", "outline-variant": "#c7c4d7", "tertiary": "#904900", "secondary": "#565e74", "primary": "#4648d4", "inverse-primary": "#c0c1ff", "surface-tint": "#494bd6", "surface-container-lowest": "#ffffff", "on-background": "#191c1e", "on-secondary-container": "#5c647a", "outline": "#767586", "on-primary-container": "#fffbff" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { xxl: "48px", base: "4px", xs: "4px", sidebar_width: "280px", xl: "32px", container_max: "1280px", md: "16px", lg: "24px", sm: "8px" },
    fontFamily: { "body-main": ["Inter"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"], "rtl-h1": ["Cairo"], "rtl-body": ["Cairo"], "display-lg": ["Inter"], h1: ["Inter"] },
    fontSize: { "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body></body>
<script>
async function init() {
  initAdminShell('settings', 'System Settings');
  const main = document.getElementById('admin-main');
  try {
    const d = await AdminAPI.get('/settings');
    const sizeMB = (d.dbSize / (1024 * 1024)).toFixed(2);
    main.innerHTML = `
      <div class="max-w-container_max mx-auto space-y-lg">
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
          <h3 class="font-h2 text-h2 text-on-surface mb-md">Admin Account</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
            <div>
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Name</span>
              <p class="font-body-main">${d.admin.name}</p>
            </div>
            <div>
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Email</span>
              <p class="font-body-main">${d.admin.email}</p>
            </div>
            <div>
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Role</span>
              <p class="font-body-main">${d.admin.role}</p>
            </div>
            <div>
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Since</span>
              <p class="font-body-main">${d.admin.created_at ? new Date(d.admin.created_at).toLocaleDateString() : '-'}</p>
            </div>
          </div>
        </div>

        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
          <h3 class="font-h2 text-h2 text-on-surface mb-md">Database Stats</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-md text-center">
            <div class="p-md bg-surface-container rounded-lg">
              <div class="font-display-lg text-display-lg text-primary">${d.stats.totalUsers}</div>
              <div class="font-label-caps text-label-caps text-on-surface-variant uppercase mt-xs">Total Users</div>
            </div>
            <div class="p-md bg-surface-container rounded-lg">
              <div class="font-display-lg text-display-lg text-primary">${d.stats.totalTasks}</div>
              <div class="font-label-caps text-label-caps text-on-surface-variant uppercase mt-xs">Total Tasks</div>
            </div>
            <div class="p-md bg-surface-container rounded-lg">
              <div class="font-display-lg text-display-lg text-primary">${d.stats.totalEntries}</div>
              <div class="font-label-caps text-label-caps text-on-surface-variant uppercase mt-xs">Journal/Mood/Habit Entries</div>
            </div>
          </div>
          <div class="mt-md p-md bg-surface-container rounded-lg flex justify-between items-center">
            <span class="font-body-main">Database Size</span>
            <span class="font-h2 text-h2 text-primary">${sizeMB} MB</span>
          </div>
        </div>

        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
          <h3 class="font-h2 text-h2 text-on-surface mb-md">Quick Actions</h3>
          <div class="flex flex-wrap gap-md">
            <button onclick="window.location.href='/admin/users.html'" class="bg-primary text-on-primary px-lg py-sm rounded-lg font-body-main hover:bg-primary/90 active:scale-95 transition-all flex items-center gap-sm">
              <span class="material-symbols-outlined">group</span> Manage Users
            </button>
            <button onclick="window.location.href='/admin/analytics.html'" class="bg-surface-container text-on-surface px-lg py-sm rounded-lg font-body-main hover:bg-surface-container-high active:scale-95 transition-all flex items-center gap-sm border border-outline-variant">
              <span class="material-symbols-outlined">analytics</span> View Analytics
            </button>
            <button onclick="window.location.href='/dashboard.html'" class="bg-surface-container text-on-surface px-lg py-sm rounded-lg font-body-main hover:bg-surface-container-high active:scale-95 transition-all flex items-center gap-sm border border-outline-variant">
              <span class="material-symbols-outlined">arrow_back</span> Back to App
            </button>
          </div>
        </div>
      </div>
    `;
  } catch (err) {
    main.innerHTML = `<p class="text-error">Error: ${err.message}</p>`;
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</html>
