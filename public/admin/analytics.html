<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Analytics - Admin - Hayati</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script src="admin.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary-container": "#6063ee", "surface-dim": "#d8dadc", "on-tertiary-fixed": "#301400", "tertiary-fixed": "#ffdcc5", "on-primary-fixed-variant": "#2f2ebe", "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5", "on-error-container": "#93000a", "secondary-container": "#dae2fd", "surface-bright": "#f7f9fb", "secondary-fixed-dim": "#bec6e0", "primary-fixed-dim": "#c0c1ff", "tertiary-fixed-dim": "#ffb783", "on-surface-variant": "#464554", "surface-container-low": "#f2f4f6", "secondary-fixed": "#dae2fd", "on-tertiary-container": "#fffbff", "inverse-surface": "#2d3133", "on-primary": "#ffffff", "tertiary-container": "#b55d00", "surface-container-high": "#e6e8ea", "on-tertiary": "#ffffff", "primary-fixed": "#e1e0ff", "surface-variant": "#e0e3e5", "background": "#f7f9fb", "on-error": "#ffffff", "on-primary-fixed": "#07006c", "on-secondary": "#ffffff", "on-tertiary-fixed-variant": "#703700", "inverse-on-surface": "#eff1f3", "surface": "#f7f9fb", "on-surface": "#191c1e", "error-container": "#ffdad6", "on-secondary-fixed-variant": "#3f465c", "error": "#ba1a1a", "on-secondary-fixed": "#131b2e", "outline-variant": "#c7c4d7", "tertiary": "#904900", "secondary": "#565e74", "primary": "#4648d4", "inverse-primary": "#c0c1ff", "surface-tint": "#494bd6", "surface-container-lowest": "#ffffff", "on-background": "#191c1e", "on-secondary-container": "#5c647a", "outline": "#767586", "on-primary-container": "#fffbff" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { xxl: "48px", base: "4px", xs: "4px", sidebar_width: "280px", xl: "32px", container_max: "1280px", md: "16px", lg: "24px", sm: "8px" },
    fontFamily: { "body-main": ["Inter"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"], "rtl-h1": ["Cairo"], "rtl-body": ["Cairo"], "display-lg": ["Inter"], h1: ["Inter"] },
    fontSize: { "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body></body>
<script>
async function init() {
  initAdminShell('analytics', 'Analytics & Reports');
  const main = document.getElementById('admin-main');
  try {
    const d = await AdminAPI.get('/analytics');
    const statsCards = [
      { label: 'Completion Rate', value: d.completionRate + '%', icon: 'check_circle', color: 'text-[#059669]' },
      { label: 'Total Users', value: (d.dailySignups || []).reduce((a,b) => a + b.count, 0), icon: 'group', color: 'text-primary' },
      { label: 'Total Pomodoros', value: (d.dailyPomodoros || []).reduce((a,b) => a + b.sessions, 0), icon: 'timer', color: 'text-[#ea580c]' },
      { label: 'Top Users', value: (d.topUsers || []).length, icon: 'emoji_events', color: 'text-tertiary' },
    ];

    const moodEmojis = { great: '😄', good: '🙂', okay: '😐', low: '😔', hard: '😫' };

    main.innerHTML = `
      <div class="max-w-container_max mx-auto space-y-lg">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-md">
          ${statsCards.map(s => `
            <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
              <div class="flex justify-between items-start mb-sm">
                <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">${s.label}</span>
                <span class="material-symbols-outlined ${s.color}">${s.icon}</span>
              </div>
              <div class="font-display-lg text-display-lg text-on-surface">${s.value}</div>
            </div>
          `).join('')}
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-lg">
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <h3 class="font-h2 text-h2 text-on-surface mb-md">Mood Distribution</h3>
            <div class="flex gap-md items-end h-40">
              ${(d.moodDistribution || []).map(m => {
                const max = Math.max(...(d.moodDistribution || []).map(x => x.count), 1);
                const pct = (m.count / max) * 100;
                return `<div class="flex flex-col items-center gap-1 flex-1"><div class="w-full bg-primary/20 rounded-t-lg relative" style="height:${pct}%"><div class="bg-primary h-full rounded-t-lg" style="height:${pct}%"></div></div><span style="font-size:24px;">${moodEmojis[m.mood] || '😐'}</span><span class="font-label-caps text-label-caps text-on-surface-variant">${m.count}</span></div>`;
              }).join('')}
              ${(!d.moodDistribution || d.moodDistribution.length === 0) ? '<p class="text-body-sm text-on-surface-variant">No mood data yet</p>' : ''}
            </div>
          </div>
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <h3 class="font-h2 text-h2 text-on-surface mb-md">Daily Signups (Last 30 days)</h3>
            <div class="space-y-1 max-h-64 overflow-y-auto">
              ${(d.dailySignups || []).map(s => `
                <div class="flex items-center gap-md text-body-sm">
                  <span class="w-24 text-on-surface-variant">${s.date}</span>
                  <div class="flex-1 bg-surface-container h-5 rounded-full overflow-hidden">
                    <div class="bg-primary h-full rounded-full" style="width:${Math.min(s.count * 10, 100)}%"></div>
                  </div>
                  <span class="font-semibold w-8 text-end">${s.count}</span>
                </div>
              `).join('')}
              ${(!d.dailySignups || d.dailySignups.length === 0) ? '<p class="text-body-sm text-on-surface-variant">No signup data yet</p>' : ''}
            </div>
          </div>
        </div>

        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
          <h3 class="font-h2 text-h2 text-on-surface mb-md">Top Users by Activity</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-body-sm">
              <thead><tr class="bg-surface-container border-b border-surface-container-high">
                <th class="text-start p-md font-label-caps">#</th>
                <th class="text-start p-md font-label-caps">Name</th>
                <th class="text-start p-md font-label-caps">Email</th>
                <th class="text-start p-md font-label-caps">Tasks</th>
                <th class="text-start p-md font-label-caps">Habits</th>
                <th class="text-start p-md font-label-caps">Moods</th>
                <th class="text-start p-md font-label-caps">Pomodoros</th>
              </tr></thead>
              <tbody>
                ${(d.topUsers || []).map((u, i) => `
                  <tr class="border-b border-surface-container-low hover:bg-surface-bright">
                    <td class="p-md font-bold">${i + 1}</td>
                    <td class="p-md">${u.name}</td>
                    <td class="p-md text-on-surface-variant">${u.email}</td>
                    <td class="p-md">${u.tasks}</td>
                    <td class="p-md">${u.habits}</td>
                    <td class="p-md">${u.moods}</td>
                    <td class="p-md">${u.pomodoros}</td>
                  </tr>
                `).join('')}
                ${(!d.topUsers || d.topUsers.length === 0) ? '<tr><td colspan="7" class="p-md text-center text-on-surface-variant">No data</td></tr>' : ''}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  } catch (err) {
    main.innerHTML = `<p class="text-error">Error: ${err.message}</p>`;
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</html>
