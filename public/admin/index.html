<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Dashboard - Hayati</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script src="admin.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary-container": "#6063ee", "surface-dim": "#d8dadc", "on-tertiary-fixed": "#301400", "tertiary-fixed": "#ffdcc5", "on-primary-fixed-variant": "#2f2ebe", "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5", "on-error-container": "#93000a", "secondary-container": "#dae2fd", "surface-bright": "#f7f9fb", "secondary-fixed-dim": "#bec6e0", "primary-fixed-dim": "#c0c1ff", "tertiary-fixed-dim": "#ffb783", "on-surface-variant": "#464554", "surface-container-low": "#f2f4f6", "secondary-fixed": "#dae2fd", "on-tertiary-container": "#fffbff", "inverse-surface": "#2d3133", "on-primary": "#ffffff", "tertiary-container": "#b55d00", "surface-container-high": "#e6e8ea", "on-tertiary": "#ffffff", "primary-fixed": "#e1e0ff", "surface-variant": "#e0e3e5", "background": "#f7f9fb", "on-error": "#ffffff", "on-primary-fixed": "#07006c", "on-secondary": "#ffffff", "on-tertiary-fixed-variant": "#703700", "inverse-on-surface": "#eff1f3", "surface": "#f7f9fb", "on-surface": "#191c1e", "error-container": "#ffdad6", "on-secondary-fixed-variant": "#3f465c", "error": "#ba1a1a", "on-secondary-fixed": "#131b2e", "outline-variant": "#c7c4d7", "tertiary": "#904900", "secondary": "#565e74", "primary": "#4648d4", "inverse-primary": "#c0c1ff", "surface-tint": "#494bd6", "surface-container-lowest": "#ffffff", "on-background": "#191c1e", "on-secondary-container": "#5c647a", "outline": "#767586", "on-primary-container": "#fffbff" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { xxl: "48px", base: "4px", xs: "4px", sidebar_width: "280px", xl: "32px", container_max: "1280px", md: "16px", lg: "24px", sm: "8px" },
    fontFamily: { "body-main": ["Inter"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"], "rtl-h1": ["Cairo"], "rtl-body": ["Cairo"], "display-lg": ["Inter"], h1: ["Inter"] },
    fontSize: { "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body></body>
<script>
async function init() {
  initAdminShell('dashboard', 'Admin Dashboard');
  const main = document.getElementById('admin-main');
  try {
    const d = await AdminAPI.get('/dashboard');
    main.innerHTML = `
      <div class="max-w-container_max mx-auto space-y-lg">
        <p class="font-body-sm text-body-sm text-on-surface-variant">System overview at a glance</p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-md">
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <div class="flex justify-between items-start mb-sm">
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Total Users</span>
              <span class="material-symbols-outlined text-primary">group</span>
            </div>
            <div class="font-display-lg text-display-lg text-on-surface">${d.totalUsers}</div>
            <div class="text-body-sm text-on-surface-variant mt-xs">${d.verifiedUsers} verified &middot; ${d.activeToday} active today</div>
          </div>
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <div class="flex justify-between items-start mb-sm">
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Tasks</span>
              <span class="material-symbols-outlined text-primary">checklist</span>
            </div>
            <div class="font-display-lg text-display-lg text-on-surface">${d.totalTasks}</div>
            <div class="text-body-sm text-on-surface-variant mt-xs">${d.completedTasks} completed (${d.totalTasks > 0 ? Math.round(d.completedTasks/d.totalTasks*100) : 0}%)</div>
          </div>
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <div class="flex justify-between items-start mb-sm">
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Habits & Journal</span>
              <span class="material-symbols-outlined text-primary">history_edu</span>
            </div>
            <div class="font-display-lg text-display-lg text-on-surface">${d.totalHabits}</div>
            <div class="text-body-sm text-on-surface-variant mt-xs">${d.totalJournal} journal entries</div>
          </div>
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <div class="flex justify-between items-start mb-sm">
              <span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Mood Logs</span>
              <span class="material-symbols-outlined text-primary">mood</span>
            </div>
            <div class="font-display-lg text-display-lg text-on-surface">${d.totalMoods}</div>
            <div class="text-body-sm text-on-surface-variant mt-xs">${d.totalGoals} goals &middot; ${d.totalCourses} courses</div>
          </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-lg">
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <h3 class="font-h2 text-h2 text-on-surface mb-md">Pomodoro Stats</h3>
            <div class="grid grid-cols-2 gap-md text-center">
              <div><div class="font-display-lg text-display-lg text-primary">${d.totalPomodoros}</div><div class="font-label-caps text-label-caps text-on-surface-variant">Sessions</div></div>
              <div><div class="font-display-lg text-display-lg text-primary">${d.pomodoroMinutes}</div><div class="font-label-caps text-label-caps text-on-surface-variant">Total Minutes</div></div>
            </div>
          </div>
          <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
            <h3 class="font-h2 text-h2 text-on-surface mb-md">Recent Users</h3>
            ${(d.recentUsers || []).map(u => `
              <div class="flex items-center gap-md py-sm border-b border-surface-container-low last:border-0">
                <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold text-sm">${escapeHtml(u.name[0])}</div>
                <div class="flex-1">
                  <p class="font-body-sm font-semibold">${escapeHtml(u.name)}</p>
                  <p class="text-body-sm text-on-surface-variant">${escapeHtml(u.email)}</p>
                </div>
                <span class="font-label-caps text-label-caps ${u.role === 'admin' ? 'bg-primary-fixed text-primary' : 'bg-surface-container text-on-surface-variant'} px-2 py-0.5 rounded-full">${escapeHtml(u.role)}</span>
              </div>
            `).join('')}
          </div>
        </div>
        ${d.moodDistribution && d.moodDistribution.length > 0 ? `
        <div class="bg-surface-container-lowest p-lg rounded-xl shadow-level-1 border border-surface-container-low">
          <h3 class="font-h2 text-h2 text-on-surface mb-md">Mood Distribution</h3>
          <div class="flex gap-md items-end h-32">
            ${d.moodDistribution.map(m => {
              const max = Math.max(...d.moodDistribution.map(x => x.count));
              const pct = (m.count / max) * 100;
              const emojis = { great: '😄', good: '🙂', okay: '😐', low: '😔', hard: '😫' };
              return `<div class="flex flex-col items-center gap-1 flex-1"><div class="w-full bg-primary/20 rounded-t-lg" style="height:${pct}%"><div class="bg-primary h-full rounded-t-lg opacity-80" style="height:${pct}%"></div></div><span>${emojis[m.mood] || '😐'}</span><span class="font-label-caps text-label-caps text-on-surface-variant">${m.count}</span></div>`;
            }).join('')}
          </div>
        </div>` : ''}
      </div>
    `;
  } catch (err) {
    main.innerHTML = `<p class="text-error">Failed to load: ${escapeHtml(err.message)}</p>`;
  }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</html>
