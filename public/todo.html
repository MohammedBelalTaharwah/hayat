<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hayati | حياتي - To-Do List</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary-container": "#6063ee", "surface-dim": "#d8dadc", "on-tertiary-fixed": "#301400", "tertiary-fixed": "#ffdcc5", "on-primary-fixed-variant": "#2f2ebe", "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5", "on-error-container": "#93000a", "secondary-container": "#dae2fd", "surface-bright": "#f7f9fb", "secondary-fixed-dim": "#bec6e0", "primary-fixed-dim": "#c0c1ff", "tertiary-fixed-dim": "#ffb783", "on-surface-variant": "#464554", "surface-container-low": "#f2f4f6", "secondary-fixed": "#dae2fd", "on-tertiary-container": "#fffbff", "inverse-surface": "#2d3133", "on-primary": "#ffffff", "tertiary-container": "#b55d00", "surface-container-high": "#e6e8ea", "on-tertiary": "#ffffff", "primary-fixed": "#e1e0ff", "surface-variant": "#e0e3e5", "background": "#f7f9fb", "on-error": "#ffffff", "on-primary-fixed": "#07006c", "on-secondary": "#ffffff", "on-tertiary-fixed-variant": "#703700", "inverse-on-surface": "#eff1f3", "surface": "#f7f9fb", "on-surface": "#191c1e", "error-container": "#ffdad6", "on-secondary-fixed-variant": "#3f465c", "error": "#ba1a1a", "on-secondary-fixed": "#131b2e", "outline-variant": "#c7c4d7", "tertiary": "#904900", "secondary": "#565e74", "primary": "#4648d4", "inverse-primary": "#c0c1ff", "surface-tint": "#494bd6", "surface-container-lowest": "#ffffff", "on-background": "#191c1e", "on-secondary-container": "#5c647a", "outline": "#767586", "on-primary-container": "#fffbff" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { xxl: "48px", base: "4px", xs: "4px", sidebar_width: "280px", xl: "32px", container_max: "1280px", md: "16px", lg: "24px", sm: "8px" },
    fontFamily: { "body-main": ["Inter"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"], "rtl-h1": ["Cairo"], "rtl-body": ["Cairo"], "display-lg": ["Inter"], h1: ["Inter"] },
    fontSize: { "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body></body>
<script>
function taskCard(task, quadrant, color, theme) {
  const checked = task.completed ? 'checked' : '';
  const textClass = task.completed ? 'line-through opacity-70' : '';
  const colorMap = {
    urgent_important: { text: 'text-error', ring: 'focus:ring-error', border: 'border-error-container/50', header: 'bg-error-container/20', label: 'bg-error text-on-error' },
    not_urgent_important: { text: 'text-primary', ring: 'focus:ring-primary', border: 'border-secondary-container/50', header: 'bg-secondary-container/30', label: 'bg-secondary-container text-on-primary-fixed' },
    urgent_not_important: { text: 'text-tertiary', ring: 'focus:ring-tertiary', border: 'border-tertiary-fixed-dim/30', header: 'bg-tertiary-fixed/30', label: 'bg-tertiary-fixed text-on-tertiary-fixed' },
    not_urgent_not_important: { text: 'text-secondary', ring: 'focus:ring-secondary', border: 'border-surface-container-high', header: 'bg-surface-container-low', label: 'bg-surface-container-high text-on-surface' }
  };
  const c = colorMap[quadrant] || colorMap.not_urgent_important;
  return `
    <div class="flex items-start gap-md p-sm hover:bg-surface-bright rounded-lg group/item border border-transparent hover:border-surface-container transition-all">
      <input type="checkbox" ${checked} class="task-check mt-1 rounded border-outline-variant ${c.text} ${c.ring} w-5 h-5 cursor-pointer" data-id="${task.id}" />
      <div class="flex-1">
        <p class="font-body-main text-body-main font-semibold text-on-background ${textClass}">${escapeHtml(task.title)}</p>
        ${task.due_time ? `<p class="font-body-sm text-body-sm ${c.text} flex items-center gap-xs mt-1"><span class="material-symbols-outlined text-[16px]">schedule</span>${escapeHtml(task.due_time)}</p>` : ''}
        ${task.due_date ? `<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-xs mt-1"><span class="material-symbols-outlined text-[16px]">event</span>${escapeHtml(task.due_date)}</p>` : ''}
        ${task.assigned_to ? `<div class="flex items-center gap-sm mt-2"><div class="w-6 h-6 rounded-full bg-primary-fixed flex items-center justify-center text-[10px] text-primary font-bold">${escapeHtml(task.assigned_to[0])}</div><span class="font-body-sm text-body-sm text-on-surface-variant">${escapeHtml(task.assigned_to)}</span></div>` : ''}
      </div>
      <button class="task-delete text-outline-variant opacity-0 group-hover/item:opacity-100 hover:text-error transition-opacity" data-id="${task.id}">
        <span class="material-symbols-outlined">delete</span>
      </button>
    </div>
  `;
}

function quadrantSection(title, icon, labelText, quadrant, tasks) {
  const colorMap = {
    urgent_important: { text: 'text-error', bg: 'bg-error-container/20', label: 'bg-error text-on-error' },
    not_urgent_important: { text: 'text-primary', bg: 'bg-secondary-container/30', label: 'bg-secondary-container text-on-primary-fixed' },
    urgent_not_important: { text: 'text-tertiary', bg: 'bg-tertiary-fixed/30', label: 'bg-tertiary-fixed text-on-tertiary-fixed' },
    not_urgent_not_important: { text: 'text-secondary', bg: 'bg-surface-container-low', label: 'bg-surface-container-high text-on-surface' }
  };
  const c = colorMap[quadrant];
  const names = {
    urgent_important: 'Do First',
    not_urgent_important: 'Schedule',
    urgent_not_important: 'Delegate',
    not_urgent_not_important: 'Eliminate'
  };
  return `
    <div class="bg-white rounded-xl shadow-sm border ${quadrant === 'urgent_important' ? 'border-error-container/50' : quadrant === 'not_urgent_important' ? 'border-secondary-container/50' : quadrant === 'urgent_not_important' ? 'border-tertiary-fixed-dim/30' : 'border-surface-container-high'} flex flex-col overflow-hidden">
      <div class="${c.bg} p-md border-b ${quadrant === 'urgent_important' ? 'border-error-container/30' : quadrant === 'not_urgent_important' ? 'border-secondary-container/50' : quadrant === 'urgent_not_important' ? 'border-tertiary-fixed-dim/30' : 'border-surface-container-high'} flex justify-between items-center">
        <div class="flex items-center gap-sm">
          <span class="material-symbols-outlined ${c.text}">${icon}</span>
          <h3 class="font-h2 text-h2 ${c.text}">${names[quadrant]}</h3>
        </div>
        <span class="font-label-caps text-label-caps ${c.label} px-sm py-xs rounded-full">${labelText}</span>
      </div>
      <div class="p-md flex-1 overflow-y-auto space-y-sm" data-quadrant="${quadrant}">
        ${tasks.length > 0 ? tasks.map(t => taskCard(t, quadrant)).join('') : '<p class="text-body-sm text-on-surface-variant text-center py-md">No tasks. Add one below.</p>'}
      </div>
      <div class="p-md border-t border-surface-container-low bg-surface-bright/50">
        <button class="add-task-btn w-full py-sm flex items-center justify-center gap-xs ${c.text} hover:bg-surface-container-low rounded-lg transition-colors font-body-sm text-body-sm font-semibold" data-quadrant="${quadrant}">
          <span class="material-symbols-outlined">add</span> Add Task
        </button>
      </div>
    </div>
  `;
}

async function init() {
  initAppShell('todo', 'To-Do List', 'Eisenhower Matrix');
  const main = document.getElementById('app-main');

  async function loadTasks() {
    try {
      const data = await API.get('/tasks?mode=eisenhower');
      const tasks = data.tasks || [];
      const q1 = tasks.filter(t => t.quadrant === 'urgent_important');
      const q2 = tasks.filter(t => t.quadrant === 'not_urgent_important');
      const q3 = tasks.filter(t => t.quadrant === 'urgent_not_important');
      const q4 = tasks.filter(t => t.quadrant === 'not_urgent_not_important');

      main.innerHTML = `
        <div class="max-w-container_max mx-auto">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-xl gap-md">
            <div>
              <h2 class="font-h1 text-h1 text-on-background mb-xs">To-Do List</h2>
              <p class="font-body-main text-body-main text-on-surface-variant">Prioritize your tasks using the Eisenhower Matrix.</p>
            </div>
            <div class="bg-surface-container flex rounded-lg p-xs shadow-sm">
              <button class="view-toggle font-label-caps text-label-caps py-sm px-md rounded-md text-on-surface-variant hover:bg-surface-container-high transition-colors" data-mode="eisenhower">EISENHOWER</button>
              <button class="view-toggle font-label-caps text-label-caps py-sm px-md rounded-md bg-white shadow-sm text-primary font-bold" data-mode="time">LIST VIEW</button>
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-lg h-auto lg:h-[700px]">
            ${quadrantSection('Urgent & Important', 'warning', 'Urgent & Important', 'urgent_important', q1)}
            ${quadrantSection('Not Urgent & Important', 'calendar_month', 'Not Urgent & Important', 'not_urgent_important', q2)}
            ${quadrantSection('Urgent & Not Important', 'forward_to_inbox', 'Urgent & Not Important', 'urgent_not_important', q3)}
            ${quadrantSection('Not Urgent & Not Important', 'delete', 'Not Urgent & Not Important', 'not_urgent_not_important', q4)}
          </div>
        </div>
      `;

      document.querySelectorAll('.view-toggle').forEach(btn => {
        btn.addEventListener('click', () => window.location.href = '/todo.html');
      });

      document.querySelectorAll('.task-check').forEach(cb => {
        cb.addEventListener('change', async function() {
          await API.put(`/tasks/${this.dataset.id}`, { completed: this.checked ? 1 : 0 });
          loadTasks();
        });
      });

      document.querySelectorAll('.task-delete').forEach(btn => {
        btn.addEventListener('click', async function() {
          await API.del(`/tasks/${this.dataset.id}`);
          loadTasks();
        });
      });

      document.querySelectorAll('.add-task-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const quadrant = this.dataset.quadrant;
          const title = prompt('Enter task title:');
          if (title) {
            API.post('/tasks', { title, quadrant, mode: 'eisenhower' }).then(() => loadTasks());
          }
        });
      });
    } catch (err) {
      main.innerHTML = `<p class="text-error">Error loading tasks: ${escapeHtml(err.message)}</p>`;
    }
  }

  loadTasks();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</html>
