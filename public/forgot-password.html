<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - Hayati | حياتي</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="/css/hayati.css" rel="stylesheet"/>
<script src="/js/api.js"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "primary-container": "#6063ee", "surface-dim": "#d8dadc", "on-tertiary-fixed": "#301400", "tertiary-fixed": "#ffdcc5", "on-primary-fixed-variant": "#2f2ebe", "surface-container": "#eceef0", "surface-container-highest": "#e0e3e5", "on-error-container": "#93000a", "secondary-container": "#dae2fd", "surface-bright": "#f7f9fb", "secondary-fixed-dim": "#bec6e0", "primary-fixed-dim": "#c0c1ff", "tertiary-fixed-dim": "#ffb783", "on-surface-variant": "#464554", "surface-container-low": "#f2f4f6", "secondary-fixed": "#dae2fd", "on-tertiary-container": "#fffbff", "inverse-surface": "#2d3133", "on-primary": "#ffffff", "tertiary-container": "#b55d00", "surface-container-high": "#e6e8ea", "on-tertiary": "#ffffff", "primary-fixed": "#e1e0ff", "surface-variant": "#e0e3e5", "background": "#f7f9fb", "on-error": "#ffffff", "on-primary-fixed": "#07006c", "on-secondary": "#ffffff", "on-tertiary-fixed-variant": "#703700", "inverse-on-surface": "#eff1f3", "surface": "#f7f9fb", "on-surface": "#191c1e", "error-container": "#ffdad6", "on-secondary-fixed-variant": "#3f465c", "error": "#ba1a1a", "on-secondary-fixed": "#131b2e", "outline-variant": "#c7c4d7", "tertiary": "#904900", "secondary": "#565e74", "primary": "#4648d4", "inverse-primary": "#c0c1ff", "surface-tint": "#494bd6", "surface-container-lowest": "#ffffff", "on-background": "#191c1e", "on-secondary-container": "#5c647a", "outline": "#767586", "on-primary-container": "#fffbff" },
    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
    spacing: { xxl: "48px", base: "4px", xs: "4px", sidebar_width: "280px", xl: "32px", container_max: "1280px", md: "16px", lg: "24px", sm: "8px" },
    fontFamily: { "body-main": ["Inter"], h2: ["Inter"], "body-sm": ["Inter"], "label-caps": ["Inter"], "rtl-h1": ["Cairo"], "rtl-body": ["Cairo"], "display-lg": ["Inter"], h1: ["Inter"] },
    fontSize: { "body-main": ["16px", { lineHeight: "1.6", fontWeight: "400" }], h2: ["20px", { lineHeight: "1.4", fontWeight: "600" }], "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }], "label-caps": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }], "rtl-h1": ["26px", { lineHeight: "1.4", fontWeight: "700" }], "rtl-body": ["16px", { lineHeight: "1.7", fontWeight: "400" }], "display-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }], h1: ["24px", { lineHeight: "1.3", fontWeight: "600" }] }
  }}
}
</script>
</head>
<body class="bg-background text-on-background font-body-main text-body-main antialiased min-h-screen flex items-center justify-center p-md">
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-sm border border-surface-variant p-xl flex flex-col gap-xl">
<header class="flex flex-col items-center gap-sm text-center">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Hayati | حياتي</h1>
<h2 class="font-h2 text-h2 text-on-surface">Reset Password</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your email and the OTP code to reset your password.</p>
</header>
<div id="error-msg" class="bg-error-container text-on-error-container p-sm rounded-lg text-body-sm hidden"></div>
<div id="success-msg" class="bg-[#d1fae5] text-[#065f46] p-sm rounded-lg text-body-sm hidden"></div>
<div id="dev-otp" class="bg-[#fef3c7] text-[#92400e] p-sm rounded-lg text-body-sm hidden text-center font-bold"></div>

<div id="step-email">
  <form id="email-form" class="flex flex-col gap-lg">
    <div class="flex flex-col gap-xs">
      <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
        <input class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg bg-surface-container-lowest text-on-surface focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-shadow" id="email" name="email" placeholder="you@example.com" required type="email"/>
      </div>
    </div>
    <button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-body-main text-body-main font-semibold py-3 rounded-lg shadow-sm transition-all duration-200 active:scale-95 flex items-center justify-center gap-sm" type="submit">
      <span>Send OTP</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </button>
  </form>
</div>

<div id="step-reset" class="hidden">
  <form id="reset-form" class="flex flex-col gap-lg">
    <div class="flex flex-col gap-xs">
      <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="otp">OTP Code (6 digits)</label>
      <input class="w-full px-4 py-2 border border-slate-200 rounded-lg bg-surface-container-lowest text-on-surface text-center text-2xl tracking-widest focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-shadow" id="otp" name="otp" placeholder="000000" required type="text" maxlength="6" pattern="\d{6}"/>
    </div>
    <div class="flex flex-col gap-xs">
      <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="new-password">New Password</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
        <input class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg bg-surface-container-lowest text-on-surface focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-shadow" id="new-password" name="password" placeholder="Min 8 characters" required type="password"/>
      </div>
    </div>
    <button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-body-main text-body-main font-semibold py-3 rounded-lg shadow-sm transition-all duration-200 active:scale-95 flex items-center justify-center gap-sm" type="submit">
      <span class="material-symbols-outlined">lock_reset</span> Reset Password
    </button>
  </form>
</div>

<footer class="flex flex-col items-center gap-md pt-md border-t border-surface-variant">
  <a class="font-body-sm text-body-sm text-primary hover:text-primary-container transition-colors flex items-center gap-xs" href="/sign-in.html">
    <span class="material-symbols-outlined text-[16px]">arrow_back</span>
    Return to Sign In
  </a>
</footer>
</main>
<script>
let resetEmail = '';

document.getElementById('email-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.classList.add('hidden');
  sucEl.classList.add('hidden');
  try {
    await API.post('/auth/forgot-password', { email });
    resetEmail = email;
    sucEl.textContent = 'OTP sent! Check your email.';
    sucEl.classList.remove('hidden');
    document.getElementById('step-email').classList.add('hidden');
    document.getElementById('step-reset').classList.remove('hidden');

    const devOtp = sessionStorage.getItem('devOtp');
    if (devOtp) {
      document.getElementById('dev-otp').textContent = 'DEV MODE: OTP is ' + devOtp;
      document.getElementById('dev-otp').classList.remove('hidden');
    }
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
});

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const otp = document.getElementById('otp').value;
  const password = document.getElementById('new-password').value;
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.classList.add('hidden');
  sucEl.classList.add('hidden');

  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters';
    errEl.classList.remove('hidden');
    return;
  }

  try {
    await API.post('/auth/reset-password', { email: resetEmail, otp, password });
    sucEl.textContent = 'Password reset successfully! Redirecting to sign in...';
    sucEl.classList.remove('hidden');
    document.getElementById('step-reset').classList.add('hidden');
    setTimeout(() => window.location.href = '/sign-in.html', 2000);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
});
</script>
</body>
</html>
