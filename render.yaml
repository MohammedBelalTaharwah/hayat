services:
  - type: web
    name: hayati
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: hayati-data
      mountPath: /opt/render/project/src
      sizeGB: 1
